<!doctype html><!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счетчик кликов</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
}

.card{
background:white;
padding:40px;
border:1px solid #ccc;
border-radius:12px;
text-align:center;
width:350px;
}

h1{
color:#333;
margin-bottom:20px;
}

.counter{
font-size:60px;
font-weight:bold;
color:#4a4a4a;
margin:20px 0;
}

button{
width:100%;
padding:15px;
border:1px solid #888;
border-radius:8px;
background:#e9e9e9;
color:#000;
font-size:18px;
cursor:pointer;
}

p{
color:#666;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>🖱 Счетчик кликов</h1>

<div class="counter">{{ cnt }}</div>

<form method="POST" action="/click">
<button type="submit">Нажми меня</button>
</form>

<p>Каждое нажатие увеличивает счетчик.</p>
</div>

</body>
</html>
