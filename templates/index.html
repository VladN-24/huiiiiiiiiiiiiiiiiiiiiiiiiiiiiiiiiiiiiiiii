<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Счетчик кликов</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.2);
width:350px;
}

h1{
color:#333;
margin-bottom:20px;
}

.counter{
font-size:60px;
font-weight:bold;
color:#6c63ff;
margin:20px 0;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#6c63ff;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#5848d6;
transform:translateY(-2px);
}

button:active{
transform:scale(.97);
}

p{
color:#777;
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>🖱 Счетчик кликов</h1>

<div class="counter">{{ cnt }}</div>

<form method="POST" action="/click">
<button type="submit">Нажми меня</button>
</form>

<p>Каждое нажатие увеличивает счетчик.</p>
</div>

</body>
</html>
